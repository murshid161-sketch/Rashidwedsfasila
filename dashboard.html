<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DigiWed Dashboard · Rashid & Fasila</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --gold:#b08d5b;
    --gold-hi:#d4a96a;
    --ink:#2D0714;
    --ivory:#F5EFE3;
    --line:rgba(176,141,91,.28);
    --serif:'Cormorant Garamond',Georgia,serif;
    --micro:'Josefin Sans',sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@300;400&display=swap');
  body{background:#110106;color:var(--ivory);font-family:var(--micro);min-height:100vh;}

  /* ── Login ── */
  #login-wrap{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:2rem;
  }
  .login-box{
    width:100%;max-width:360px;
    background:#1a0509;border:1px solid var(--gold);padding:2.5rem 2rem;text-align:center;
  }
  .login-box .logo{font-family:var(--serif);font-style:italic;font-size:1.8rem;color:var(--gold);margin-bottom:.3rem;}
  .login-box .sub{font-size:.55rem;letter-spacing:.3em;opacity:.5;margin-bottom:2rem;}
  .login-box input{
    width:100%;padding:.85rem 1rem;background:transparent;border:1px solid var(--line);
    color:var(--ivory);font-size:1rem;margin-bottom:.75rem;text-align:center;letter-spacing:.2em;
  }
  .login-box input:focus{outline:none;border-color:var(--gold);}
  .btn-gold{
    width:100%;padding:.9rem;background:var(--gold);color:var(--ink);
    font-family:var(--micro);font-size:.6rem;letter-spacing:.4em;border:none;cursor:pointer;
    transition:background .3s;
  }
  .btn-gold:hover{background:var(--gold-hi);}
  .err{color:#e07070;font-size:.6rem;letter-spacing:.15em;margin-top:.6rem;display:none;}

  /* ── Dashboard ── */
  #dash-wrap{display:none;padding:2rem 1rem 4rem;max-width:560px;margin:0 auto;}

  .db-header{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:1rem;margin-bottom:1.8rem;
  }
  .db-header .title{font-family:var(--serif);font-style:italic;font-size:1.6rem;color:var(--gold);}
  .db-header .couple{font-size:.55rem;letter-spacing:.25em;opacity:.5;margin-top:.2rem;}
  .btn-out{
    padding:.5rem 1rem;background:transparent;border:1px solid rgba(255,255,255,.2);
    color:var(--ivory);font-family:var(--micro);font-size:.5rem;letter-spacing:.2em;cursor:pointer;
  }

  /* Stats */
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;margin-bottom:1.8rem;}
  .stat{background:rgba(176,141,91,.08);border:1px solid var(--gold);padding:1rem .5rem;text-align:center;}
  .stat .num{font-family:var(--serif);font-style:italic;font-size:2rem;color:var(--gold);}
  .stat.yes .num{color:#7ecf7e;}
  .stat.no .num{color:#e07070;}
  .stat .lbl{font-size:.5rem;letter-spacing:.2em;opacity:.55;margin-top:.3rem;}

  /* Section label */
  .sec-label{font-size:.6rem;letter-spacing:.3em;color:var(--gold);margin-bottom:.6rem;opacity:.85;}

  /* Guest link */
  .link-row{display:flex;gap:.5rem;margin-bottom:.4rem;}
  .link-row input{
    flex:1;padding:.7rem .9rem;background:transparent;border:1px solid var(--line);
    color:var(--ivory);font-size:.9rem;
  }
  .link-row input:focus{outline:none;border-color:var(--gold);}
  .link-out{font-size:.58rem;opacity:.45;word-break:break-all;min-height:1rem;margin-bottom:1.4rem;}
  .wa-btn{
    display:inline-block;margin-top:.4rem;padding:.5rem 1rem;background:#25D366;color:#fff;
    font-family:var(--micro);font-size:.5rem;letter-spacing:.2em;border:none;cursor:pointer;
  }

  /* Table */
  .tbl-wrap{overflow-x:auto;margin-bottom:1rem;}
  table{width:100%;border-collapse:collapse;font-size:.65rem;}
  thead tr{border-bottom:1px solid var(--gold);}
  th{padding:.5rem .4rem;text-align:left;opacity:.55;letter-spacing:.15em;white-space:nowrap;}
  td{padding:.45rem .4rem;border-bottom:1px solid rgba(255,255,255,.05);}
  .at-yes{color:#7ecf7e;font-size:.8rem;}
  .at-no{color:#e07070;font-size:.8rem;}

  /* Buttons row */
  .btn-row{display:flex;gap:.6rem;margin-bottom:1.2rem;}
  .btn-outline{
    flex:1;padding:.75rem;background:transparent;border:1px solid var(--gold);
    color:var(--gold);font-family:var(--micro);font-size:.55rem;letter-spacing:.3em;cursor:pointer;
    transition:background .3s;
  }
  .btn-outline:hover{background:rgba(176,141,91,.1);}

  /* Wishes count */
  .wish-strip{
    text-align:center;padding:1rem;border:1px solid var(--line);
    font-size:.6rem;letter-spacing:.25em;opacity:.6;
  }
  .wish-strip span{color:var(--gold);font-size:1rem;font-family:var(--serif);font-style:italic;display:block;margin-bottom:.3rem;}

  /* Wish list */
  .wish-item{padding:1rem 1rem 1rem 1.2rem;border-left:2px solid var(--gold);margin-bottom:.7rem;background:rgba(255,255,255,.01);}
  .wish-name{font-family:var(--serif);font-style:italic;color:var(--gold-hi);font-size:1rem;margin-bottom:.25rem;}
  .wish-msg{font-size:.85rem;opacity:.75;line-height:1.5;}
  .wish-time{font-size:.55rem;letter-spacing:.15em;opacity:.4;margin-top:.4rem;}

  .tab-row{display:flex;gap:.5rem;margin-bottom:1.2rem;}
  .tab{
    flex:1;padding:.6rem;text-align:center;font-family:var(--micro);font-size:.55rem;
    letter-spacing:.25em;border:1px solid var(--line);cursor:pointer;transition:.3s;
  }
  .tab.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}

  .section{margin-bottom:2rem;}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-wrap">
  <div class="login-box">
    <div class="logo">DigiWed</div>
    <div class="sub">DASHBOARD · RASHID &amp; FASILA</div>
    <input type="password" id="pw" placeholder="Password" autocomplete="off"/>
    <button class="btn-gold" onclick="doLogin()">ENTER</button>
    <div class="err" id="err">Incorrect password</div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dash-wrap">
  <div class="db-header">
    <div>
      <div class="title">Dashboard</div>
      <div class="couple">RASHID A &amp; FASILA · JUNE 2026</div>
    </div>
    <button class="btn-out" onclick="logout()">LOG OUT</button>
  </div>

  <!-- Tabs -->
  <div class="tab-row">
    <div class="tab active" onclick="showTab('rsvp',this)">RSVPs</div>
    <div class="tab" onclick="showTab('wishes',this)">WISHES</div>
  </div>

  <!-- RSVP TAB -->
  <div id="tab-rsvp">
    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="num" id="s-total">0</div><div class="lbl">TOTAL</div></div>
      <div class="stat yes"><div class="num" id="s-yes">0</div><div class="lbl">ATTENDING</div></div>
      <div class="stat no"><div class="num" id="s-no">0</div><div class="lbl">NOT COMING</div></div>
    </div>

    <!-- Guest link -->
    <div class="section">
      <div class="sec-label">GUEST PERSONALISED LINK</div>
      <div class="link-row">
        <input type="text" id="guest-name" placeholder="Guest name…"/>
        <button class="btn-gold" style="width:auto;padding:.7rem 1rem;font-size:.55rem;" onclick="genLink()">COPY</button>
      </div>
      <div class="link-out" id="link-out"></div>
    </div>

    <!-- Export -->
    <div class="btn-row">
      <button class="btn-outline" onclick="exportCSV()">⬇ EXPORT CSV</button>
    </div>

    <!-- Table -->
    <div class="section">
      <div class="sec-label">ALL RESPONSES</div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>NAME</th>
              <th>ATTEND</th>
              <th>GUESTS</th>
              <th>MESSAGE</th>
              <th>TIME</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="no-rsvp" style="text-align:center;padding:2rem;opacity:.4;font-size:.65rem;letter-spacing:.2em;display:none;">NO RSVPs YET</div>
      </div>
    </div>
  </div>

  <!-- WISHES TAB -->
  <div id="tab-wishes" style="display:none;">
    <div class="wish-strip"><span id="w-count">0</span>DUAS &amp; WISHES RECEIVED</div>
    <br/>
    <div id="wish-list"></div>
    <div id="no-wish" style="text-align:center;padding:2rem;opacity:.4;font-size:.65rem;letter-spacing:.2em;display:none;">NO WISHES YET</div>
  </div>

</div><!-- /dash-wrap -->

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const FB_CONFIG={
  apiKey:"AIzaSyC5jv-2q9GjFGXcJdm2GJRgCrjHyPSwkAw",
  authDomain:"yaseen-jumana-wedding.firebaseapp.com",
  databaseURL:"https://yaseen-jumana-wedding-default-rtdb.firebaseio.com",
  projectId:"yaseen-jumana-wedding",
  storageBucket:"yaseen-jumana-wedding.appspot.com",
  messagingSenderId:"234567890123",
  appId:"1:234567890123:web:abcdef1234567890"
};
const RSVP_PATH='rashid-fasila/rsvp';
const WISH_PATH='rashid-fasila/wishes';
const PASSWORD='Rashidwedsfasila';

let rsvpData=[];

function esc(s){return String(s||'').replace(/[<>"'&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c]));}

// ── Login ──
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogin(){
  if(document.getElementById('pw').value===PASSWORD){
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('dash-wrap').style.display='block';
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    loadAll();
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
  }
}

function logout(){
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('dash-wrap').style.display='none';
  document.getElementById('pw').value='';
}

// ── Tabs ──
function showTab(name,el){
  document.getElementById('tab-rsvp').style.display=name==='rsvp'?'block':'none';
  document.getElementById('tab-wishes').style.display=name==='wishes'?'block':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

// ── Load data ──
function loadAll(){
  // RSVPs — live
  firebase.database().ref(RSVP_PATH).on('value',snap=>{
    rsvpData=[];
    let yes=0,no=0;
    snap.forEach(c=>{rsvpData.push({key:c.key,...c.val()});if(c.val().attending==='yes')yes++;else if(c.val().attending==='no')no++;});
    document.getElementById('s-total').textContent=rsvpData.length;
    document.getElementById('s-yes').textContent=yes;
    document.getElementById('s-no').textContent=no;
    const tbody=document.getElementById('tbody');
    if(!rsvpData.length){
      tbody.innerHTML='';
      document.getElementById('no-rsvp').style.display='block';
      return;
    }
    document.getElementById('no-rsvp').style.display='none';
    tbody.innerHTML=rsvpData.slice().reverse().map(r=>`
      <tr>
        <td>${esc(r.name)}</td>
        <td class="${r.attending==='yes'?'at-yes':'at-no'}">${r.attending==='yes'?'✓':'✗'}</td>
        <td style="text-align:center;opacity:.7;">${esc(r.guests||'1')}</td>
        <td style="opacity:.6;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.msg||'—')}</td>
        <td style="opacity:.5;white-space:nowrap;">${esc(r.time||'')}</td>
      </tr>
    `).join('');
  });

  // Wishes — live
  firebase.database().ref(WISH_PATH).orderByChild('ts').on('value',snap=>{
    const items=[];
    snap.forEach(c=>items.unshift(c.val()));
    document.getElementById('w-count').textContent=items.length;
    const wl=document.getElementById('wish-list');
    if(!items.length){
      wl.innerHTML='';
      document.getElementById('no-wish').style.display='block';
      return;
    }
    document.getElementById('no-wish').style.display='none';
    wl.innerHTML=items.map(w=>`
      <div class="wish-item">
        <div class="wish-name">${esc(w.name)}</div>
        <div class="wish-msg">"${esc(w.msg)}"</div>
        <div class="wish-time">${esc(w.time||'')}</div>
      </div>
    `).join('');
  });
}

// ── Guest link ──
function genLink(){
  const name=document.getElementById('guest-name').value.trim();
  if(!name){alert('Enter guest name first');return;}
  const url=`https://murshid161-sketch.github.io/Rashidwedsfasila/?guest=${encodeURIComponent(name)}`;
  navigator.clipboard.writeText(url).catch(()=>{});
  document.getElementById('link-out').innerHTML=`✓ Copied · <a href="https://wa.me/?text=${encodeURIComponent('You\'re invited to Rashid A & Fasila\'s Wedding! 🌙\nView your personal invitation: '+url)}" target="_blank" style="color:var(--gold-hi);">Share via WhatsApp ↗</a>`;
}

// ── Export CSV ──
function exportCSV(){
  const rows=[['Name','Attending','Guests','Message','Time']];
  rsvpData.forEach(r=>rows.push([r.name||'',r.attending||'',r.guests||'1',r.msg||'',r.time||'']));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='rashid-fasila-rsvp.csv';
  a.click();
}
</script>
</body>
</html>
